name: CI & Optional Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      - name: Build backend
        working-directory: backend
        run: |
          ./mvnw -B -DskipTests package

  build-frontend:
    runs-on: ubuntu-latest
    # Decouple builds to allow parallel execution
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend
        working-directory: frontend
        run: |
          npm ci
      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

  deploy-backend-render:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Check Render secrets
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "RENDER_API_KEY or RENDER_SERVICE_ID not set — skipping Render deploy"; exit 0
          fi
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render deploy for service ${RENDER_SERVICE_ID}"
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Check Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Vercel credentials missing (needs TOKEN, ORG_ID, PROJECT_ID) — skipping Vercel deploy"; exit 0
          fi
      - name: Deploy to Vercel (CLI)
        run: |
          cd frontend
          npx vercel --prod --token "$VERCEL_TOKEN" --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
